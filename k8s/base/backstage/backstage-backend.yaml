apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage-backend
      backstage.io/kubernetes-id: backstage
  template:
    metadata:
      labels:
        app: backstage-backend
        backstage.io/kubernetes-id: backstage
    spec:
      serviceAccountName: backstage-k8s-reader
      containers:
        - name: backstage-backend
          image: ghcr.io/your-org/developer-portal/backstage-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7007
          env:
            - name: APP_CONFIG_auth_providers_guest_dangerouslyAllowOutsideDevelopment
              value: "true"
          envFrom:
            - configMapRef:
                name: backstage-config
            - secretRef:
                name: backstage-secret
            - secretRef:
                name: postgres-secret
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: backstage-backend
  labels:
    app: backstage-backend
spec:
  selector:
    app: backstage-backend
  ports:
    - name: http
      port: 7007
      targetPort: 7007
