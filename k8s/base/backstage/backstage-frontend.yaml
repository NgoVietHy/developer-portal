apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage-frontend
      backstage.io/kubernetes-id: backstage
  template:
    metadata:
      labels:
        app: backstage-frontend
        backstage.io/kubernetes-id: backstage
    spec:
      containers:
        - name: backstage-frontend
          image: ghcr.io/your-org/developer-portal/backstage-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backstage-frontend
spec:
  selector:
    app: backstage-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
