name: Deploy to Minikube

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

permissions:
  contents: read

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      PUBLIC_BASE_URL: http://103.72.97.87
      GRAFANA_URL: http://103.72.97.87:3000
      PROMETHEUS_URL: http://103.72.97.87:9090
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Print target image tag
        shell: bash
        run: echo "Deploy validation for image tag ${{ steps.vars.outputs.image_tag }}"

      - name: Validate public endpoints
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "${PUBLIC_BASE_URL}/" >/dev/null
          curl -fsS "${GRAFANA_URL}/login" >/dev/null
          curl -fsS "${PROMETHEUS_URL}/-/ready" >/dev/null

      - name: Validate Backstage APIs
        shell: bash
        run: |
          set -euo pipefail
          token=$(curl -fsS -X POST -H "Content-Type: application/json" -d '{}' "${PUBLIC_BASE_URL}/api/auth/guest/refresh" | python3 -c "import json,sys; print(json.load(sys.stdin).get('backstageIdentity',{}).get('token',''))")
          test -n "${token}"
          curl -fsS -H "Authorization: Bearer ${token}" "${PUBLIC_BASE_URL}/api/catalog/entities?limit=20" >/dev/null
          curl -fsS -H "Authorization: Bearer ${token}" "${PUBLIC_BASE_URL}/api/kubernetes/clusters" >/dev/null
          curl -fsS -H "Authorization: Bearer ${token}" "${PUBLIC_BASE_URL}/api/techdocs/metadata/entity/default/component/service-catalog" >/dev/null
