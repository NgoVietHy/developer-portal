name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  NODE_VERSION: "22"
  IMAGE_TAG: ${{ github.sha }}

jobs:
  service-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [service-catalog, service-identity]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}
      - name: Run tests
        run: npm test
        working-directory: services/${{ matrix.service }}

  backstage-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Enable corepack
        run: corepack enable
      - name: Install Backstage dependencies
        run: yarn install
        working-directory: backstage
      - name: Lint Backstage
        run: yarn lint:all
        working-directory: backstage
      - name: Type check Backstage
        run: yarn tsc
        working-directory: backstage

  build-scan-images:
    runs-on: ubuntu-latest
    needs: [service-tests, backstage-quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backstage-backend
            dockerfile: docker/backstage-backend.Dockerfile
            context: .
          - name: backstage-frontend
            dockerfile: docker/backstage-frontend.Dockerfile
            context: .
          - name: service-catalog
            dockerfile: services/service-catalog/Dockerfile
            context: services/service-catalog
          - name: service-identity
            dockerfile: services/service-identity/Dockerfile
            context: services/service-identity
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        run: |
          docker build -f "${{ matrix.dockerfile }}" -t "${{ matrix.name }}:${{ env.IMAGE_TAG }}" "${{ matrix.context }}"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ matrix.name }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          docker tag "${{ matrix.name }}:${{ env.IMAGE_TAG }}" "ghcr.io/${OWNER_LC}/${{ github.event.repository.name }}/${{ matrix.name }}:${{ env.IMAGE_TAG }}"
          docker tag "${{ matrix.name }}:${{ env.IMAGE_TAG }}" "ghcr.io/${OWNER_LC}/${{ github.event.repository.name }}/${{ matrix.name }}:latest"
          docker push "ghcr.io/${OWNER_LC}/${{ github.event.repository.name }}/${{ matrix.name }}:${{ env.IMAGE_TAG }}"
          docker push "ghcr.io/${OWNER_LC}/${{ github.event.repository.name }}/${{ matrix.name }}:latest"
